name: Build Android APK

on:
  push:
    branches: [ main ] # Roda toda vez que você der push na main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install Dependencies
        run: npm install

      - name: Build Web Assets
        run: |
          mkdir -p www
          # Busca o index que está lá no fundo da pasta android e traz para o www
          cp ./android/app/src/main/assets/public/index.html www/
          
          # Se os outros arquivos estiverem na raiz, ele copia. 
          # Se estiverem em www, ele garante que fiquem lá.
          cp calc.js www/ 2>/dev/null || :
          cp style.css www/ 2>/dev/null || :
          
          echo "Conteúdo da pasta www para o build:"
          ls www

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Sync Capacitor
        run: |
          npx cap copy android
          npx cap update android

      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk